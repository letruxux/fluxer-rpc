name: update-env-example

on:
  push:
    branches: [main]
    paths:
      - src/env.ts
      - src/env-schema.ts
      - scripts/generate-default-env.ts

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: update env files
        run: bun run env-gen

      - name: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .env.example docker-compose.yml
          git diff --staged --quiet || git commit -m "chore: update env files"

      - name: push
        run: |
          git push
